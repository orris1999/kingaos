name: KingaOS CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kingaos_app
          POSTGRES_PASSWORD: kingaos_ci_password
          POSTGRES_DB: kingaos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kingaos_app -d kingaos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://kingaos_app:kingaos_ci_password@localhost:5432/kingaos_test?schema=public
      DIRECT_URL: postgresql://kingaos_app:kingaos_ci_password@localhost:5432/kingaos_test?schema=public
      SESSION_SECRET: ci-session-secret-only-for-automated-tests
      SESSION_COOKIE_SECURE: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed test database
        run: npm run db:seed

      - name: Typecheck
        run: npm run typecheck

      - name: Domain tests
        run: npm run test

      - name: Build
        run: npm run build
